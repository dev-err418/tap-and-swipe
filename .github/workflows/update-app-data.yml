name: Update app data

on:
  schedule:
    - cron: "0 7 */3 * *"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/update-app-data.ts
        env:
          SENSORTOWER_PROXY_URL: ${{ secrets.SENSORTOWER_PROXY_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh app-data"
          file_pattern: "content/app-data/*.json public/apps/**"
