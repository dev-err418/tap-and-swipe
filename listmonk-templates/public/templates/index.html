{{ define "header" }}
<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>{{ .Data.Title }} - Tap & Swipe</title>
  <meta name="description" content="{{ .Data.Description }}" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />

  {{ if .EnablePublicArchive }}
    <link rel="alternate" type="application/rss+xml" title="{{ L.T "public.archiveTitle" }} - {{ .SiteName }}"
      href="{{ .RootURL }}/archive.xml" />
  {{ end }}

  {{ if ne .FaviconURL "" }}
    <link rel="icon" href="{{ .FaviconURL }}" type="image/x-icon" />
  {{ else }}
    <link rel="icon" href="/public/static/favicon.png?v={{ .AssetVersion }}" type="image/png" />
  {{ end }}

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .wrap {
      background: #fff;
      max-width: 480px;
      width: 100%;
      border-radius: 16px;
      padding: 40px 36px;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }
    .header .logo a {
      text-decoration: none;
      color: #000;
    }
    .header .logo img {
      height: 36px;
      width: auto;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    p { margin-bottom: 16px; }

    a { color: #000; }
    a:hover { color: #555; }

    ul {
      list-style: none;
      padding: 0;
      margin: 0 0 16px 0;
    }
    ul li {
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }

    .button {
      display: inline-block;
      background: #000;
      color: #fff !important;
      border: none;
      border-radius: 100px;
      padding: 12px 32px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .button:hover { background: #333; }

    .button-outline {
      background: transparent;
      color: #000 !important;
      border: 1px solid rgba(0,0,0,0.15);
    }
    .button-outline:hover {
      background: #f5f5f5;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 10px 16px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    input[type="email"]:focus {
      border-color: rgba(0,0,0,0.4);
    }

    input[type="checkbox"],
    input[type="radio"] {
      margin-right: 8px;
      accent-color: #000;
    }

    label {
      font-size: 14px;
      cursor: pointer;
    }

    section { margin-bottom: 24px; }

    .lists li {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .row {
      padding: 12px 0;
      font-size: 14px;
    }

    footer.container {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 24px;
    }
    footer.container a {
      color: #999;
      text-decoration: underline;
    }

    .optin-form ul,
    .unsub-form ul,
    .manage-form ul {
      margin: 12px 0;
    }

    @media screen and (max-width: 600px) {
      body { padding: 20px 12px; }
      .wrap { padding: 28px 24px; }
    }
  </style>

  <link href="/public/custom.css?v={{ .AssetVersion }}" rel="stylesheet" type="text/css">
  <script src="/public/custom.js?v={{ .AssetVersion }}" async defer></script>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="logo">
        <a href="https://tap-and-swipe.com">
        {{ if ne .LogoURL "" }}
          <img src="{{ .LogoURL }}" alt="Tap & Swipe" />
        {{ else }}
          <strong style="font-size: 18px;">Tap & Swipe</strong>
        {{ end }}
        </a>
      </div>
    </header>
{{ end }}

{{ define "footer" }}
  </div>

  <footer class="container">
    <strong style="color: #666;">Tap & Swipe</strong><br />
    Made with ❤️ in 🇫🇷<br />

    SIREN: 100454206
  </footer>
</body>
</html>
{{ end }}
