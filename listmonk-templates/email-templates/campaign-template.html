<!doctype html>
<html lang="en">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
<style>
body {
  background-color: #f5f5f4;
  font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 15px;
  line-height: 1.7;
  margin: 0;
  color: #1a1a1a;
}
.wrap {
  background-color: #fff;
  padding: 40px 36px;
  max-width: 520px;
  margin: 0 auto;
  border-radius: 12px;
}
.header {
  padding-bottom: 24px;
  margin-bottom: 24px;
  border-bottom: 1px solid #e5e5e5;
}
.header img {
  height: 36px;
  width: auto;
}
.footer {
  text-align: center;
  font-size: 12px;
  color: #999;
  line-height: 1.6;
}
.footer a {
  color: #999;
  text-decoration: underline;
}
.gutter {
  padding: 30px;
}
p {
  margin: 0 0 16px 0;
}
a {
  color: #000;
}
a:hover {
  color: #444;
}
h2 {
  font-size: 20px;
  font-weight: 600;
  margin: 0 0 12px 0;
}
img {
  max-width: 100%;
}
.button {
  background: #000;
  color: #fff !important;
  display: inline-block;
  border-radius: 100px;
  padding: 12px 32px;
  text-align: center;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
}
@media screen and (max-width: 600px) {
  .wrap { max-width: auto; }
  .gutter { padding: 12px; }
}
</style>
</head>
<body style="background-color: #f5f5f4;">
<div class="gutter">&nbsp;</div>
<div class="wrap">
  <p style="font-size: 13px; color: #999; margin-bottom: 8px; text-align: right;">{{ Date "January 2, 2006" }}&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;<a href="{{ MessageURL }}" style="color: #999; text-decoration: underline;">Read Online</a></p>
  <main>
    {{ template "content" . }}
  </main>
</div>
<div class="gutter">
  <div class="footer">
    <p style="font-weight: 600; color: #666; margin-bottom: 0;">Tap & Swipe</p>
    <p style="margin-bottom: 0;">Made with ❤️ in 🇫🇷</p>
    <p style="margin-bottom: 0;">SIREN: 100454206</p>
    <p style="margin-top: 12px; margin-bottom: 0;">Click <a href="{{ UnsubscribeURL }}">here</a> if you want to stop receiving emails from me.</p>
  </div>
</div>
</body>
</html>
